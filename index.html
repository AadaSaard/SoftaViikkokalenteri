            <div id="modal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h2 id="week-header"></h2>
                    <div id="week-info"></div>
                    <div id="map-card">
                        <h3>Sijainti</h3>
                        <iframe id="map-iframe" width="100%" height="300" frameborder="0" style="border:0" allowfullscreen></iframe>
                        <br>
                        <a id="map-link" href="#" target="_blank">Avaa Google Mapsissa</a>
                    </div>
                </div>
            </div>

    </main>

    <script> 
    let tanaan = new Date();
    let aloitus = new Date("2026-05-18");

    let eroMillisekunteina = tanaan - aloitus;
    let paivat = eroMillisekunteina / (1000 * 60 * 60 * 24);
    
    let nykyinenViikko = paivat < 0 ? 0 : Math.floor(paivat / 7) + 1;

    const weekHeaders = {
        1: "Viikko 1 (18.5-24.5)", 2: "Viikko 2 (25.5-31.5)", 3: "Viikko 3 (1.6-7.6)",
        4: "Viikko 4 (8.6-14.6)", 5: "Viikko 5 (15.6-21.6)", 6: "Viikko 6 (22.6-28.6)",
        7: "Viikko 7 (29.6-5.7)", 8: "Viikko 8 (6.7-12.7)", 9: "Viikko 9 (13.7-19.7)",
        10: "Viikko 10 (20.7-26.7)", 11: "Viikko 11 (27.7-2.8)", 12: "Viikko 12 (3.8-9.8)",
        13: "Viikko 13 (10.8-16.8)"
    };

    const weeks = document.querySelectorAll('.week');
    const modal = document.getElementById('modal');
    const weekHeader = document.getElementById('week-header');
    const weekInfo = document.getElementById('week-info');
    const closeBtn = document.querySelector('.close');
    const mapIframe = document.getElementById('map-iframe');
    const mapLink = document.getElementById('map-link');

    weeks.forEach(week => {
        let num = parseInt(week.dataset.week);

        if (num > nykyinenViikko) {
            week.classList.add("locked");
            week.style.opacity = "0.5";
            week.style.cursor = "not-allowed";
        }

        week.addEventListener('click', () => {
            if (num > nykyinenViikko) {
                alert("Tämä viikko aukeaa vasta myöhemmin!");
                return;
            }

            const info = week.dataset.info;
            const mapUrl = week.dataset.mapurl;

            weekHeader.textContent = weekHeaders[num] || `Viikko ${num}`;
            weekInfo.innerHTML = info;

            if (mapUrl) {
                mapIframe.src = mapUrl; 
                mapLink.href = mapUrl.replace('/embed?pb=', '/maps?q='); 
            }

            modal.style.display = 'block';
        });
    });

    closeBtn.onclick = () => modal.style.display = 'none';
    window.onclick = (event) => { if (event.target === modal) modal.style.display = 'none'; };
</script>
